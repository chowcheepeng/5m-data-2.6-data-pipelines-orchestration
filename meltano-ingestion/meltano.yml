default_environment: dev
project_id: 019e622e-6c65-7fd4-b463-a994ff602d35
environments:
- name: dev
- name: staging
- name: prod
python: python3.11
plugins:
  extractors:
  - name: tap-github
    variant: meltanolabs
    pip_url: meltanolabs-tap-github
    config:
      repositories:
      - pandas-dev/pandas
    select:
    - releases.tag_name
    - releases.body
    - releases.published_at
  loaders:
  - name: target-jsonl
    variant: andyh1203
    pip_url: target-jsonl
  - name: target-bigquery
    variant: z3z1ma
    pip_url: git+https://github.com/z3z1ma/target-bigquery.git setuptools<80
    config:
      credentials_path: /home/hlgra/diesel-monitor-496704-q5-768457bbb6d1.json
      dataset: ingestion
      denormalized: true
      flattening_enabled: false
      flattening_max_depth: 1
      method: batch_job
      project: diesel-monitor-496704-q5
